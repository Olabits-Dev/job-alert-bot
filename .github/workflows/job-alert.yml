name: Daily Job Alert

on:
  schedule:
    # GitHub cron is UTC.
    # If you want 9:00am Lagos (UTC+1), use 08:00 UTC:
    - cron: "0 8 * * *"
  workflow_dispatch: {}

jobs:
  send-email:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Restore cache (seen jobs)
        uses: actions/cache@v4
        with:
          path: .cache
          key: seen-cache-v1
          restore-keys: |
            seen-cache-

      - name: Install dependencies
        run: npm install

      - name: Run script
        run: npm start
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

      - name: Save cache (seen jobs)
        uses: actions/cache@v4
        with:
          path: .cache
          key: seen-cache-v1
