name: Daily Job Alert

on:
  schedule:
    # Lagos is UTC+1. This runs 9:00am Lagos = 08:00 UTC.
    - cron: "0 8 * * *"
  workflow_dispatch: {}

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore seen-cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: seen-cache-v1
          restore-keys: |
            seen-cache-

      - name: Install dependencies
        run: npm install

      - name: Run alert
        run: npm start
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

      - name: Save seen-cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: seen-cache-v1
